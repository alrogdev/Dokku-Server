; ansible/inventory.ini
; To migrate to new VPS:
; 1. Update server_ip in group_vars/all/vars.yml
; 2. Update domain in group_vars/all/vars.yml  
; 3. Run: ansible-playbook site.yml

[prod]
clawtech.ru ansible_port={{ ssh_port }} ansible_user=root ansible_ssh_private_key_file=../keys/clawtech-vps.pem

[prod:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
