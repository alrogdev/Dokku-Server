---
# ansible/roles/dokku-install/tasks/main.yml
# Install Dokku

- name: Download and install Dokku
  shell: |
    wget -qO- https://dokku.com/install.sh | bash
  args:
    creates: /usr/local/bin/dokku

- name: Create symlink to /usr/bin/dokku
  file:
    src: /usr/local/bin/dokku
    dest: /usr/bin/dokku
    state: link
    force: yes
  ignore_errors: yes

- name: Wait for Dokku to be available
  wait_for:
    path: /usr/local/bin/dokku
    state: present
    timeout: 60

- name: Configure Dokku global domain
  command: dokku domains:set-global {{ domain }}
  ignore_errors: yes

- name: Install Dokku plugins
  command: dokku plugin:install {{ item.url }} {{ item.name }}
  loop: "{{ dokku_plugins }}"
  ignore_errors: yes
