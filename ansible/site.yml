---
# ansible/site.yml
# Main Ansible playbook for Dokku PaaS server setup

# Pre-tasks: Base system setup
- name: Base System Setup
  hosts: prod
  become: yes
  gather_facts: yes

  vars:
    telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - ncdu
          - fail2ban
          - python3-pip
          - python3-docker
        state: present

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Install Dokku
      shell: |
        wget -qO- https://dokku.com/install.sh | bash
      args:
        creates: /usr/bin/dokku

    - name: Find dokku binary
      find:
        paths: /usr/bin
        patterns: dokku
      register: dokku_binary
      ignore_errors: yes

    - name: Create dokku symlink if not in path
      file:
        src: /usr/local/bin/dokku
        dest: /usr/bin/dokku
        state: link
      when: dokku_binary.matched == 0
      ignore_errors: yes

    - name: Configure Dokku global domain
      command: dokku domains:set-global {{ domain }}
      ignore_errors: yes

    - name: Install Dokku plugins
      command: dokku plugin:install {{ item.url }} {{ item.name }}
      loop: "{{ dokku_plugins }}"
      ignore_errors: yes

    - name: Configure SSH port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port '
        line: 'Port {{ ssh_port }}'
        backup: yes
      notify: restart ssh

    - name: Configure PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin {{ ssh_permit_root_login }}'
        backup: yes
      notify: restart ssh

    - name: Configure PasswordAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        backup: yes
      notify: restart ssh

    - name: Configure PubkeyAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
        backup: yes
      notify: restart ssh

    - name: Restart SSH immediately
      meta: flush_handlers

  handlers:
    - name: restart ssh
      systemd:
        name: ssh
        state: restarted

# Security roles
- name: Security Setup
  hosts: prod
  become: yes
  gather_facts: yes

  vars:
    telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') }}"

  roles:
    - nftables
    - crowdsec
    - aide
    - lynis

# Dokku deployment setup
- name: Dokku Deployment Setup
  hosts: prod
  become: yes
  gather_facts: yes

  roles:
    - role: dokku-deploy
      tags: [dokku-deploy]
    - role: landing
      tags: [landing]
